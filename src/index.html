<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCD Dungeon</title>
  <meta name="description" content="強迫観念を倒すべき敵として可視化し、ERP（曝露反応妨害法）をゲーム感覚で楽しく続けられるアプリ。" />
  <!-- Google Fonts: M PLUS Rounded 1c -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ===== ホーム画面 ===== -->
  <div id="screen-home" class="screen active">
    <div class="home-room" id="home-room"></div>
    <div class="home-ui">

      <!-- タイトル -->
      <div class="screen-header">
        <div class="title-banner">
          <h1>OCD Dungeon</h1>
        </div>
        <p class="subtitle">心の波を静め、穏やかな時間を取り戻そう</p>
      </div>

      <!-- 統計 -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 100 100" class="svg-icon coin-icon">
              <circle cx="50" cy="50" r="40" fill="#FFD700" stroke="#B8860B" stroke-width="2" />
              <text x="50" y="65" font-family="sans-serif" font-size="40" font-weight="bold" fill="#FFF"
                text-anchor="middle">C</text>
            </svg>
          </div>
          <div class="stat-value" id="coin-count">0</div>
          <div class="stat-label">コイン</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 100 100" class="svg-icon">
              <!-- 提供画像に基づいたピースサインのシルエット -->
              <path d="M50,95 C35,95 30,85 30,75 L30,55 Q30,45 40,45 L60,45 Q70,45 70,55 L70,75 C70,85 65,95 50,95 Z" fill="#FFE0B2" stroke="#8D6E63" stroke-width="4" stroke-linejoin="round" />
              <!-- 人差し指 -->
              <path d="M42,45 L42,15 Q42,5 50,5 Q58,5 58,15 L58,45" fill="#FFE0B2" stroke="#8D6E63" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
              <!-- 中指 -->
              <path d="M60,45 L75,10 Q78,0 88,3 Q98,6 92,18 L75,50" fill="#FFE0B2" stroke="#8D6E63" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
              <!-- 折り畳んだ指のライン -->
              <path d="M42,55 Q42,65 52,65 Q62,65 62,55" fill="none" stroke="#8D6E63" stroke-width="4" stroke-linecap="round" />
              <path d="M38,65 Q32,65 32,50" fill="none" stroke="#8D6E63" stroke-width="4" stroke-linecap="round" />
              <!-- 輝きのエフェクト -->
              <g stroke="#FFD700" stroke-width="3" stroke-linecap="round">
                <line x1="10" y1="20" x2="18" y2="15" />
                <line x1="50" y1="2" x2="50" y2="8" />
                <line x1="90" y1="20" x2="82" y2="15" />
              </g>
            </svg>
          </div>
          <div class="stat-value" id="total-wins">0</div>
          <div class="stat-label">総勝利数</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 100 100" class="svg-icon">
              <circle cx="50" cy="50" r="40" fill="#FFD700" stroke="#B8860B" stroke-width="2" />
              <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"
                stroke-dasharray="4 4" />
              <path d="M50,30 L55,45 L70,45 L58,55 L63,70 L50,60 L37,70 L42,55 L30,45 L45,45 Z" fill="#FFF" />
            </svg>
          </div>
          <div class="stat-value" id="total-medals">0</div>
          <div class="stat-label">メダル</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 100 100" class="svg-icon">
              <defs>
                <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                  <stop offset="0%" stop-color="#FF8C42" />
                  <stop offset="100%" stop-color="#FFB74D" />
                </linearGradient>
              </defs>
              <!-- 提供画像に基づいた炎のシルエット -->
              <path d="M50,95 C25,95 10,75 10,50 C10,35 25,25 28,15 Q30,5 35,15 Q40,25 40,35 Q40,20 50,5 Q60,20 60,35 Q60,25 65,15 Q70,5 72,15 T75,45 Q75,25 85,35 Q90,45 90,55 C90,75 75,95 50,95 Z" fill="url(#fireGrad)" stroke="#E65100" stroke-width="3" stroke-linejoin="round" />
              <!-- 内側の炎のアクセント -->
              <path d="M50,85 C35,85 25,75 25,55 Q35,60 40,45 Q45,60 50,30 Q55,60 60,45 Q65,60 75,55 Q75,75 50,85 Z" fill="#FFD740" opacity="0.6" />
            </svg>
          </div>
          <div class="stat-value" id="streak-count">0</div>
          <div class="stat-label">連続日数</div>
        </div>
      </div>

      <!-- アクションボタン -->
      <div class="home-actions">
        <button id="btn-start-quest" class="btn btn-primary btn-large" onclick="showScreen('screen-select')">
          <svg viewBox="0 0 100 100" class="btn-icon">
            <path d="M20,80 L35,45 L80,20 L85,25 L55,70 Z" fill="#FFF" opacity="0.9" />
            <path d="M15,85 L30,70" stroke="#FFF" stroke-width="8" stroke-linecap="round" />
          </svg>
          クエストに出発！
        </button>
        <div class="home-sub-buttons">
          <button class="btn btn-secondary" onclick="showScreen('screen-medals')">
            <svg viewBox="0 0 100 100" class="btn-icon-sm">
              <circle cx="50" cy="50" r="40" fill="#FFB74D" />
              <path d="M50,30 L55,45 L70,45 L58,55 L63,70 L50,60 L37,70 L42,55 L30,45 L45,45 Z" fill="#FFF" />
            </svg>
            メダル図鑑
          </button>
          <button class="btn btn-secondary" onclick="showScreen('screen-goods')">
            <svg viewBox="0 0 100 100" class="btn-icon-sm">
              <rect x="20" y="35" width="60" height="45" rx="4" fill="#64B5F6" />
              <path d="M20,50 H80" stroke="#FFF" stroke-width="4" />
              <path d="M50,35 V80" stroke="#FFF" stroke-width="4" />
              <path d="M50,35 Q40,20 30,35 Q60,20 70,35" fill="#BBDEFB" stroke="#FFF" stroke-width="2" />
            </svg>
            グッズ交換所
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 敵選択画面 ===== -->
  <div id="screen-select" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="showScreen('screen-home')">← もどる</button>
      <h2>
        <svg viewBox="0 0 100 100" class="header-icon">
          <!-- ピースサイン（簡略版・シルエット調整済み） -->
          <path d="M50,92 C40,92 35,85 35,78 L35,60 Q35,55 45,55 L65,55 Q75,55 75,60 L75,78 C75,85 70,92 50,92 Z" fill="#FFE0B2" stroke="#D35400" stroke-width="4" stroke-linejoin="round" />
          <path d="M42,55 L42,30 Q42,25 48,25 Q54,25 54,30 L54,55" fill="#FFE0B2" stroke="#D35400" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M56,55 L68,25 Q70,20 78,22 Q86,24 82,32 L70,60" fill="#FFE0B2" stroke="#D35400" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        クエスト選択
      </h2>
      <p>今の心の状態に近いキャラクターを選ぼう</p>
    </div>

    <div class="scrollable-content">
      <div class="enemy-grid" id="enemy-grid">
        <!-- 敵カードはJSで生成 -->
      </div>

      <!-- カスタム敵 -->
      <div class="custom-enemy-section">
        <h3>
          <svg viewBox="0 0 100 100" class="btn-icon-sm">
            <path d="M50,20 L80,50 L50,80 L20,50 Z" fill="#BA68C8" />
            <path d="M50,35 L65,50 L50,65 L35,50 Z" fill="#E1BEE7" />
          </svg>
          カスタム敵
        </h3>
        <p class="custom-desc">あなただけのオリジナルの心の影を設定しよう</p>
        <div class="custom-form">
          <input type="text" id="custom-name" class="input-field" placeholder="敵に名前をつけよう（例：ドキドキくん）" maxlength="20" />
          <button class="btn btn-accent" onclick="selectCustomEnemy()">この敵と戦う！</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 難易度選択画面 ===== -->
  <div id="screen-difficulty" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="showScreen('screen-select')">← もどる</button>
      <h2>
        <svg viewBox="0 0 100 100" class="header-icon">
          <path d="M50,20 L80,80 L20,80 Z" fill="#FFD740" />
          <path d="M50,40 L65,75 L35,75 Z" fill="#FFF" opacity="0.8" />
        </svg>
        難易度選択
      </h2>
      <p>今日の自分の状態に合わせて選ぼう</p>
    </div>

    <div class="selected-enemy-preview" id="selected-enemy-preview">
      <!-- 選択した敵のプレビューがJSで入る -->
    </div>

    <div class="difficulty-cards">
      <button class="difficulty-card difficulty-easy" onclick="startBattle('easy')" id="diff-easy">
        <div class="diff-icon">
          <svg viewBox="0 0 100 100">
            <path d="M50,80 Q30,60 50,20 Q70,60 50,80" fill="#81C784" />
            <path d="M30,50 Q50,70 70,50" stroke="#C8E6C9" stroke-width="4" fill="none" stroke-linecap="round" />
          </svg>
        </div>
        <div class="diff-name">よわい</div>
        <div class="diff-time">30チャージ</div>
        <div class="diff-desc">ちょっとだけ試してみる</div>
      </button>
      <button class="difficulty-card difficulty-normal" onclick="startBattle('normal')" id="diff-normal">
        <div class="diff-icon">
          <svg viewBox="0 0 100 100">
            <path d="M40,20 L60,50 L30,50 L70,80 L50,50 L80,50 Z" fill="#64B5F6" />
          </svg>
        </div>
        <div class="diff-name">ふつう</div>
        <div class="diff-time">100チャージ</div>
        <div class="diff-desc">いつもどおりに挑戦</div>
      </button>
      <button class="difficulty-card difficulty-hard" onclick="startBattle('hard')" id="diff-hard">
        <div class="diff-icon">
          <svg viewBox="0 0 100 100">
            <path d="M50,15 Q30,40 50,90 Q70,40 50,15" fill="#FF8A65" />
            <path d="M50,35 Q40,50 50,75 Q60,50 50,35" fill="#FF5722" />
          </svg>
        </div>
        <div class="diff-name">つよい</div>
        <div class="diff-time">250チャージ</div>
        <div class="diff-desc">本気で立ち向かう</div>
      </button>
    </div>
  </div>

  <!-- ===== 戦闘画面 ===== -->
  <div id="screen-battle" class="screen">
    <div class="screen-header">
      <div class="battle-enemy-name" id="battle-enemy-name"></div>
      <p class="battle-subtitle">「今ここ」に意識を向け、心の平穏を取り戻そう</p>
    </div>

    <!-- 敵キャラクター -->
    <div class="enemy-display" id="enemy-display">
      <div class="enemy-aura" id="enemy-aura"></div>
      <div class="enemy-sprite" id="enemy-sprite"></div>
      <div class="enemy-speech-bubble" id="enemy-speech-bubble"></div>
    </div>

    <!-- 連打ボタン -->
    <div class="tap-action-area">
      <button class="btn-tap" id="btn-tap" onclick="handleBattleTap(event)">
        <span class="tap-icon">
          <svg viewBox="0 0 100 100" class="btn-icon">
            <path d="M50,10 L60,40 L90,50 L60,60 L50,90 L40,60 L10,50 L40,40 Z" fill="#FFF" />
          </svg>
        </span>
        <span class="tap-text">エネルギーを放つ！</span>
      </button>
    </div>

    <!-- 心の平穏チャージゲージ -->
    <div class="charge-section">
      <div class="charge-label">
        <svg viewBox="0 0 100 100" class="btn-icon-sm">
          <path d="M50,10 L60,40 L90,50 L60,60 L50,90 L40,60 L10,50 L40,40 Z" fill="#FFD740" />
        </svg>
        心の平穏チャージ
      </div>
      <div class="charge-bar-wrap">
        <div class="charge-bar" id="charge-bar">
          <div class="charge-glow"></div>
        </div>
      </div>
      <div class="charge-percent" id="charge-percent">0%</div>
    </div>

    <!-- キャンセルボタン -->
    <button class="btn btn-retreat" id="btn-retreat" onclick="retreatBattle()">
      <svg viewBox="0 0 100 100" class="btn-icon-sm">
        <path d="M30,80 L40,60 L35,40 L50,20 L65,40 L60,60 L70,80" stroke="#E65100" stroke-width="6" fill="none"
          stroke-linecap="round" />
        <circle cx="50" cy="15" r="10" fill="#E65100" />
      </svg>
      自分のペースで休む
    </button>
  </div>

  <!-- ===== 撃破演出画面 ===== -->
  <div id="screen-victory" class="screen">
    <div class="victory-content">
      <div class="victory-cannon-wrap">
        <div class="cannon-beam" id="cannon-beam"></div>
      </div>
      <div class="victory-enemy" id="victory-enemy"></div>
      <div class="explosion-particles" id="explosion-particles"></div>

      <h2 class="victory-title" id="victory-title">撃破！</h2>
      <p class="victory-msg" id="victory-msg"></p>

      <!-- 獲得報酬 -->
      <div class="victory-rewards" id="victory-rewards">
        <div class="reward-item">
          <span class="reward-icon">
            <svg viewBox="0 0 100 100" class="btn-icon-sm coin-icon">
              <circle cx="50" cy="50" r="40" fill="#FFD700" stroke="#B8860B" stroke-width="2" />
              <text x="50" y="65" font-family="sans-serif" font-size="40" font-weight="bold" fill="#FFF"
                text-anchor="middle">C</text>
            </svg>
          </span>
          <span class="reward-label">+<span id="reward-coin">0</span> コイン</span>
        </div>
      </div>

      <!-- 新メダル獲得（条件達成時のみ表示） -->
      <div class="new-medal-popup" id="new-medal-popup" style="display:none;">
        <div class="medal-shine"></div>
        <div class="medal-icon" id="new-medal-icon"></div>
        <div class="medal-text">メダルを獲得した！</div>
      </div>



      <button class="btn btn-primary" onclick="showScreen('screen-home')" style="margin-top:24px;">
        ホームに戻る
      </button>
      <button class="btn btn-secondary" onclick="showScreen('screen-select')" style="margin-top:8px;">
        クエストを続ける
      </button>
    </div>
  </div>

  <!-- ===== メダル図鑑画面 ===== -->
  <div id="screen-medals" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="showScreen('screen-home')">← 戻る</button>
      <h2>
        <svg viewBox="0 0 100 100" class="header-icon">
          <circle cx="50" cy="50" r="40" fill="#FFB74D" />
          <path d="M50,30 L55,45 L70,45 L58,55 L63,70 L50,60 L37,70 L42,55 L30,45 L45,45 Z" fill="#FFF" />
        </svg>
        メダル図鑑
      </h2>
      <p>努力の証を集めよう</p>
    </div>
    <div class="medals-grid" id="medals-grid">
      <!-- メダルカードはJSで生成 -->
    </div>
  </div>

  <!-- ===== グッズ図鑑画面 ===== -->
  <div id="screen-goods" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="showScreen('screen-home')">← もどる</button>
      <h2>
        <svg viewBox="0 0 100 100" class="header-icon">
          <rect x="20" y="35" width="60" height="45" rx="4" fill="#64B5F6" />
          <path d="M20,50 H80" stroke="#FFF" stroke-width="4" />
          <path d="M50,35 V80" stroke="#FFF" stroke-width="4" />
        </svg>
        グッズ交換所
      </h2>
      <p>コインを使ってリラックスグッズを集めよう</p>
      <div class="shop-coin-display"
        style="display: flex; align-items: center; justify-content: center; font-size: 1.2rem; margin-top: 8px; font-weight: bold; color: #5D4037;">
        <svg viewBox="0 0 100 100" class="btn-icon-sm coin-icon" style="margin-right: 6px;">
          <circle cx="50" cy="50" r="40" fill="#FFD700" stroke="#B8860B" stroke-width="2" />
          <text x="50" y="65" font-family="sans-serif" font-size="40" font-weight="bold" fill="#FFF"
            text-anchor="middle">C</text>
        </svg>
        所持コイン: <span id="shop-coin-count">0</span>
      </div>
    </div>
    <div class="goods-grid" id="goods-grid">
      <!-- グッズカードはJSで生成 -->
    </div>
  </div>



  <!-- ===== 撤退確認モーダル ===== -->
  <div id="retreat-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <div class="retreat-icon">
        <svg viewBox="0 0 100 100" style="width: 60px; height: 60px;">
          <path d="M30,80 L40,60 L35,40 L50,20 L65,40 L60,60 L70,80" stroke="#E65100" stroke-width="6" fill="none"
            stroke-linecap="round" />
          <circle cx="50" cy="15" r="10" fill="#E65100" />
        </svg>
      </div>
      <h3>休憩する？</h3>
      <p>ペナルティはないよ。<br>また挑戦しよう！</p>
      <div class="modal-buttons">
        <button class="btn btn-primary" onclick="confirmRetreat()">うん、休憩する</button>
        <button class="btn btn-secondary" onclick="closeRetreatModal()">もう少し頑張る！</button>
      </div>
    </div>
  </div>

  <script type="module" src="main.ts"></script>
</body>

</html>
